{% extends "base.html" %}
{% block content %}
<h1>Resim Yükle</h1>
{% if error %}
  <div class="error">{{ error }}</div>
{% endif %}
<form method="POST" enctype="multipart/form-data" class="upload-form">
  <label>Başlık *</label>
  <input type="text" name="title" required placeholder="Resim başlığı">

  <label>Açıklama</label>
  <textarea name="description" placeholder="İsteğe bağlı açıklama"></textarea>

  <label>Resim Dosyası *</label>
  <input type="file" name="image" accept="image/*" required>

  <button type="submit">Yükle</button>
</form>
{% endblock %}
